<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hash AI</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    :root {
      --bg:           #09090b;
      --surface:      #18181b;
      --surface-2:    #27272a;
      --border:       #3f3f46;
      --accent:       #8b5cf6;
      --accent-dark:  #6d28d9;
      --accent-glow:  rgba(139,92,246,0.12);
      --text:         #fafafa;
      --muted:        #a1a1aa;
      --success:      #10b981;
      --warning:      #f59e0b;
      --radius:       12px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      height: 56px;
      padding: 0 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .logo-mark {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--accent) 0%, #ec4899 100%);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      box-shadow: 0 0 12px rgba(139,92,246,0.4);
    }

    .logo-name {
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .badge {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 2px 9px;
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 0.03em;
    }

    /* ── Main layout ── */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 272px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      flex-direction: column;
    }

    .sidebar-title {
      padding: 1.125rem 1.25rem 0.625rem;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
    }

    /* Upload zone */
    .upload-zone {
      margin: 0 1rem;
      border: 1.5px dashed var(--border);
      border-radius: var(--radius);
      padding: 1.5rem 1rem;
      text-align: center;
      cursor: pointer;
      position: relative;
      transition: border-color 0.18s, background 0.18s;
    }
    .upload-zone:hover, .upload-zone.drag-over {
      border-color: var(--accent);
      background: var(--accent-glow);
    }
    .upload-zone input {
      position: absolute; inset: 0;
      opacity: 0; cursor: pointer;
      width: 100%; height: 100%;
    }

    .upload-icon-wrap {
      width: 44px; height: 44px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 0.75rem;
      font-size: 1.2rem;
    }
    .upload-zone strong { font-size: 0.82rem; display: block; margin-bottom: 0.2rem; }
    .upload-zone small { font-size: 0.72rem; color: var(--muted); }

    /* File list */
    .file-list {
      padding: 0.625rem 1rem 0;
      display: flex;
      flex-direction: column;
      gap: 0.375rem;
      overflow-y: auto;
      flex: 1;
    }

    .file-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.45rem 0.625rem;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.78rem;
      animation: fadeIn 0.2s ease;
    }
    .file-item .fi-icon { color: var(--accent); flex-shrink: 0; font-size: 0.9rem; }
    .file-item .fi-name {
      flex: 1; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
      color: var(--text);
    }

    /* Status pill */
    .status-pill {
      margin: 0.75rem 1rem;
      padding: 0.45rem 0.75rem;
      border-radius: 8px;
      font-size: 0.78rem;
      display: none;
      align-items: center;
      gap: 0.5rem;
    }
    .status-pill.success {
      display: flex;
      background: rgba(16,185,129,0.1);
      border: 1px solid rgba(16,185,129,0.25);
      color: var(--success);
    }
    .status-pill.loading {
      display: flex;
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--muted);
    }

    /* ── Chat area ── */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-title {
      padding: 1.125rem 1.5rem 0.625rem;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      scroll-behavior: smooth;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 999px; }

    /* Empty state */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      color: var(--muted);
      text-align: center;
      padding: 2rem;
      pointer-events: none;
    }
    .empty-state .es-icon {
      width: 56px; height: 56px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem;
      margin-bottom: 0.25rem;
    }
    .empty-state p { font-size: 0.85rem; max-width: 260px; line-height: 1.5; }

    /* Messages */
    .msg {
      display: flex;
      gap: 0.625rem;
      animation: fadeUp 0.2s ease;
    }
    .msg.user { flex-direction: row-reverse; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .avatar {
      width: 30px; height: 30px;
      border-radius: 8px;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem;
      font-weight: 700;
    }
    .msg.user .avatar {
      background: linear-gradient(135deg, var(--accent), #ec4899);
      color: #fff;
    }
    .msg.ai .avatar {
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--muted);
    }

    .bubble {
      max-width: 68%;
      padding: 0.7rem 0.95rem;
      border-radius: var(--radius);
      font-size: 0.875rem;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user .bubble {
      background: var(--accent);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg.ai .bubble {
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }

    /* Thinking dots */
    .thinking {
      display: flex; gap: 5px; align-items: center;
      padding: 0.2rem 0.1rem;
    }
    .dot {
      width: 6px; height: 6px;
      background: var(--muted);
      border-radius: 50%;
      animation: bounce 1.2s infinite ease-in-out;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.35; }
      40%           { transform: translateY(-7px); opacity: 1; }
    }

    /* Warning bar */
    .warn-bar {
      display: none;
      margin: 0 1.5rem 0.5rem;
      padding: 0.5rem 0.875rem;
      background: rgba(245,158,11,0.1);
      border: 1px solid rgba(245,158,11,0.25);
      border-radius: 8px;
      font-size: 0.78rem;
      color: var(--warning);
    }

    /* Input */
    .input-area {
      padding: 0.875rem 1.5rem 1.125rem;
      border-top: 1px solid var(--border);
    }
    .input-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.4rem 0.4rem 0.4rem 1rem;
      transition: border-color 0.18s;
    }
    .input-row:focus-within { border-color: var(--accent); }

    .input-row input {
      flex: 1;
      background: transparent;
      border: none; outline: none;
      color: var(--text);
      font-size: 0.875rem;
    }
    .input-row input::placeholder { color: var(--muted); }

    .send-btn {
      width: 34px; height: 34px;
      background: var(--accent);
      border: none; border-radius: 8px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.18s, opacity 0.18s;
    }
    .send-btn:hover:not(:disabled) { background: var(--accent-dark); }
    .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .send-btn svg { width: 15px; height: 15px; fill: #fff; }
  </style>
</head>
<body>

<header>
  <div class="logo-mark">⚡</div>
  <span class="logo-name">Hash AI</span>
  <span class="badge">Beta</span>
</header>

<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-title">Documents</div>

    <label class="upload-zone" id="uploadZone">
      <input type="file" id="fileInput" accept=".pdf" multiple />
      <div class="upload-icon-wrap">📄</div>
      <strong>Upload PDFs</strong>
      <small>Click or drag &amp; drop files here</small>
    </label>

    <div class="file-list" id="fileList"></div>
    <div class="status-pill" id="statusPill"></div>
  </aside>

  <!-- Chat -->
  <main class="chat-area">
    <div class="chat-title">Conversation</div>

    <div class="messages" id="messages">
      <div class="empty-state" id="emptyState">
        <div class="es-icon">💬</div>
        <p>Upload a PDF document and ask anything about its contents.</p>
      </div>
    </div>

    <div class="warn-bar" id="warnBar">Please upload a document first.</div>

    <div class="input-area">
      <div class="input-row">
        <input
          type="text"
          id="questionInput"
          placeholder="Ask a question about your documents…"
          autocomplete="off"
        />
        <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send">
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  </main>

</div>

<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  let documentText = '';

  // Drag-and-drop
  const zone = document.getElementById('uploadZone');
  zone.addEventListener('dragover',  e => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', ()  => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('drag-over');
    handleFiles(Array.from(e.dataTransfer.files).filter(f => f.type === 'application/pdf'));
  });

  document.getElementById('fileInput').addEventListener('change', e => {
    handleFiles(Array.from(e.target.files));
  });

  async function handleFiles(files) {
    if (!files.length) return;
    setStatus('loading', '⏳ Reading documents…');

    const fileList = document.getElementById('fileList');
    fileList.innerHTML = '';

    let allText = '';
    for (const file of files) {
      const row = document.createElement('div');
      row.className = 'file-item';
      row.innerHTML = `<span class="fi-icon">📄</span><span class="fi-name" title="${esc(file.name)}">${esc(file.name)}</span>`;
      fileList.appendChild(row);

      const buf = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
      for (let i = 1; i <= pdf.numPages; i++) {
        const page    = await pdf.getPage(i);
        const content = await page.getTextContent();
        allText += content.items.map(it => it.str).join(' ') + '\n';
      }
    }

    documentText = allText;
    document.getElementById('messages').innerHTML = '';
    setStatus('success', `✓ ${files.length} document${files.length > 1 ? 's' : ''} loaded`);
  }

  function setStatus(type, text) {
    const pill = document.getElementById('statusPill');
    pill.className = `status-pill ${type}`;
    pill.textContent = text;
  }

  document.getElementById('questionInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) sendMessage();
  });

  async function sendMessage() {
    const input    = document.getElementById('questionInput');
    const question = input.value.trim();
    if (!question) return;

    const warnBar = document.getElementById('warnBar');
    if (!documentText) { warnBar.style.display = 'block'; return; }
    warnBar.style.display = 'none';

    input.value = '';
    appendMsg('user', question);

    const btn = document.getElementById('sendBtn');
    btn.disabled = true;

    const thinking = appendThinking();

    try {
      const res  = await fetch('/api/chat', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ question, document_text: documentText })
      });
      const data = await res.json();
      thinking.remove();
      appendMsg('ai', data.answer || data.error || 'No response received.');
    } catch {
      thinking.remove();
      appendMsg('ai', 'Something went wrong. Please try again.');
    }

    btn.disabled = false;
    input.focus();
  }

  function appendMsg(role, text) {
    const box = document.getElementById('messages');
    const el  = document.createElement('div');
    el.className = `msg ${role}`;
    el.innerHTML = `
      <div class="avatar">${role === 'user' ? 'U' : 'AI'}</div>
      <div class="bubble">${esc(text)}</div>
    `;
    box.appendChild(el);
    box.scrollTop = box.scrollHeight;
    return el;
  }

  function appendThinking() {
    const box = document.getElementById('messages');
    const el  = document.createElement('div');
    el.className = 'msg ai';
    el.innerHTML = `
      <div class="avatar">AI</div>
      <div class="bubble">
        <div class="thinking">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
      </div>
    `;
    box.appendChild(el);
    box.scrollTop = box.scrollHeight;
    return el;
  }

  function esc(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>

</body>
</html>
